name: Selenium Firefox CI

on:
  push:
    branches:
      - main

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Containers
        run: docker compose build

      - name: Run Tests (stable mode)
        run: docker compose up --abort-on-container-exit selenium-tests-firefox

      - name: Verify Reports
        run: ls -R reports || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-reports
          path: reports/firefox/

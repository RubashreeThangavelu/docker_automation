name: Docker CI/CD with Trivy Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Build Docker image from docker-compose or Dockerfile
      - name: Build Docker Image
        run: docker build -t my-app:latest .

      # 3. Install Trivy (FIXED METHOD - official repo)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      # 4. Run vulnerability scan (SECURITY GATE)
      - name: Run Trivy Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            my-app:latest

      # 5. Generate report (always run)
      - name: Generate Trivy Report
        if: always()
        run: trivy image my-app:latest > trivy-report.txt

      # 6. Upload report to GitHub artifacts
      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

name: Docker Compose CI with Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Docker Compose (preinstalled but ensure compatibility)
      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      # 3. Build Docker images from docker-compose.yml
      - name: Build Docker Compose Images
        run: docker compose build

      # 4. List images (to get image name for scanning)
      - name: List Docker Images
        run: docker images

      # 5. Install Trivy
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      # 6. Scan Docker image (IMPORTANT STEP)
      - name: Run Trivy Scan
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 your-image-name:latest

      # 7. Generate report (always run even if scan fails)
      - name: Generate Report
        if: always()
        run: |
          trivy image your-image-name:latest > trivy-report.txt

      # 8. Upload report
      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

version: "3.9"

x-common-volumes: &common-volumes
  - ./reports:/reports
  - shared-data:/data
  - ./Docker_backup:/usr/local/tomcat/webapps/Docker_backup

x-test-template: &test-template
  build: .
  working_dir: /app
  networks:
    - selenium-grid
  volumes: *common-volumes
  command: >
     sh -c "
     set -e &&
     /init-data.sh &&

     echo 'Cleaning old reports...' &&
     rm -rf /reports/firefox/* &&
     rm -rf target &&

     echo 'Running Maven tests...' &&
     mvn clean test &&

     echo 'Copying reports...' &&
     mkdir -p /reports/firefox &&
     cp -r target/surefire-reports/* /reports/firefox/ &&

     echo 'Reports copied successfully' &&
     exec sleep infinity"

services:

  app:
    image: tomcat:10.1
    container_name: tomcat-app
    ports:
      - "8081:8080"
    volumes:
      - ./Docker_backup:/usr/local/tomcat/webapps/Docker_backup
      - shared-data:/data
    environment:
      - TZ=Asia/Kolkata
    networks:
      - selenium-grid

  firefox:
    image: selenium/standalone-firefox:4.18.1
    container_name: firefox
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - selenium-grid

  selenium-tests-firefox:
    <<: *test-template
    container_name: selenium-tests-firefox
    depends_on:
      - firefox
      - app
    environment:
      BROWSER: firefox
      SELENIUM_URL: http://firefox:4444/wd/hub

volumes:
  shared-data:

networks:
  selenium-grid:

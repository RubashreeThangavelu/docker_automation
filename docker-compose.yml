services:

  app:
    image: tomcat:10.1
    container_name: tomcat-app
    ports:
      - "8081:8080"
    volumes:
      - ./Docker_backup:/usr/local/tomcat/webapps/Docker_backup
      - shared-data:/data
    environment:
      - TZ=Asia/Kolkata
    networks:
      - selenium-grid

  firefox:
    image: selenium/standalone-firefox:4.18.1
    container_name: firefox
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - selenium-grid

  selenium-tests:
    build: .
    container_name: selenium-tests
    depends_on:
      - firefox
      - app
    working_dir: /app
    command: >
      sh -c "set -e;
      /init-data.sh &&
      echo 'Waiting for Selenium...' &&
      sleep 20 &&
      mvn test &&
      mkdir -p /reports &&
      cp -r target/surefire-reports /reports/"
    volumes:
      - ./reports:/reports
      - shared-data:/data
    networks:
      - selenium-grid

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    privileged: true
    networks:
      - selenium-grid

volumes:
  shared-data:
  jenkins_home:

networks:
  selenium-grid:
